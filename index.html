<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Manga Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .manga-card { transition: transform 0.2s; }
        .manga-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">
    <header class="p-4 bg-slate-800 shadow-xl mb-6">
        <h1 class="text-2xl font-bold text-center text-orange-500">Manga Tracker</h1>
    </header>

    <main class="px-4 pb-20">
        <h2 class="text-xl font-semibold mb-4 border-l-4 border-orange-500 pl-2">Ma Bibliothèque</h2>
        <div id="library" class="grid grid-cols-2 gap-4">
            <p class="text-slate-400">Chargement de la collection...</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800 p-4 border-t border-slate-700 flex justify-around">
        <button class="text-orange-500 font-bold">📚 Biblio</button>
        <button class="text-slate-400">📅 Planning</button>
    </nav>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // REMPLACE PAR TES INFOS FIREBASE ICI
  const firebaseConfig = {
    apiKey: "AIzaSyDM0WD7YfmjHqn6PPsLQLyIVsy4FPyXRvU",
    authDomain: "mangatracker-634c2.firebaseapp.com",
    projectId: "mangatracker-634c2",
    storageBucket: "mangatracker-634c2.firebasestorage.app",
    messagingSenderId: "843885385322",
    appId: "1:843885385322:web:e451950476a833418bdc13"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Lecture en temps réel de ta collection "mangas"
  onSnapshot(collection(db, "mangas"), (snapshot) => {
    const library = document.getElementById("library");
    library.innerHTML = ""; // On vide pour rafraîchir
    
    snapshot.forEach((doc) => {
      const manga = doc.data();
      library.innerHTML += `
        <div class="manga-card bg-slate-800 rounded-lg overflow-hidden shadow-lg border border-slate-700">
          <img src="${manga.url_image}" class="w-full h-48 object-cover">
          <div class="p-3">
            <h3 class="font-bold text-sm truncate">${manga.titre}</h3>
            <p class="text-orange-400 text-xs mt-1">Chapitre ${manga.dernier_chapitre}</p>
            <a href="${manga.lien_chapitre}" target="_blank" rel="noopener noreferrer" class="mt-3 block text-center bg-orange-500 hover:bg-orange-600 text-white py-2 rounded text-xs font-bold uppercase transition-colors">
  LIRE LE CHAPITRE
</a>
          </div>
        </div>
      `;
    });
  });
</script>
    </body>
</html>
